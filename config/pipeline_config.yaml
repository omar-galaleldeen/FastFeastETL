watcher:
  batch:
    dir: "data/input/batch"
    trigger_hour: 6
    expected_files:

      customers.csv:
        table: "Dim_Customer"
      drivers.csv:
        table: "Dim_Driver"
      agents.csv:
        table: "Dim_Agent"
      regions.csv:
        table: "Dim_Region"
      reasons.csv:
        table: "Dim_Reason"
      categories.csv:
        table: "Dim_Restaurant"
      segments.csv:
        table: "Dim_Customer"
      teams.csv:
        table: "Dim_Agent"
      channels.csv:
        table: "Dim_Channel"
      priorities.csv:
        table: "Dim_Priority"
      reason_categories.csv:
        table: "Dim_Reason"
      restaurants.json:
        table: "Dim_Restaurant"
      cities.json:
        table: "Dim_Region"
  stream:
    dir: "data/input/stream"
    expected_files:
      orders.json:
        table: "Fact_Order"
        foreign_keys:
          customer_id: customers
          driver_id: drivers
          restaurant_id: restaurants
      tickets.csv:
        table: "Fact_Ticket"
        foreign_keys:
          order_id: orders
          agent_id: agents
      ticket_events.json:
        table: "Fact_Ticket_Event"
        foreign_keys:
          ticket_id: tickets


tracker:
  db_path: "data/tracker/pipeline_tracker.db"

reader:
  file_type_map:
    # batch — dimensions
    customers.csv:         "customers"
    drivers.csv:           "drivers"
    agents.csv:            "agents"
    regions.csv:           "regions"
    reasons.csv:           "reasons"
    categories.csv:        "categories"
    segments.csv:          "segments"
    teams.csv:             "teams"
    channels.csv:          "channels"
    priorities.csv:        "priorities"
    reason_categories.csv: "reason_categories"
    restaurants.json:      "restaurants"
    cities.json:           "cities"
    # stream — facts
    orders.json:           "orders"
    tickets.csv:           "tickets"
    ticket_events.json:    "ticket_events"

logging:
  dir: "logs"  

alerting:
  enabled: True
  smtp:
    host: "smtp.gmail.com"
    port: 587
    user_name: "your_email@gmail.com"
    password: "YOUR_APP_PASSWORD_HERE"
    sender: "your_email@gmail.com"
    receivers: 
      - "your_email@gmail.com"